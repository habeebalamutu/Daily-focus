<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Focus</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="corner-accent top-left"></div>
    <div class="corner-accent top-right"></div>
    <div class="corner-accent bottom-left"></div>
    <div class="corner-accent bottom-right"></div>
    
    <main class="app">
        <header class="header">
            <span class="date-display" id="dateDisplay"></span>
            <h1>Focus</h1>
            <div class="countdown" id="countdown">
                <span class="countdown-label">Time left</span>
                <span class="countdown-timer" id="countdownTimer">--:--:--</span>
            </div>
        </header>
        
        <section class="input-section">
            <label for="goalInput" class="input-label">Add a goal</label>
            <div class="input-wrap">
                <input type="text" id="goalInput" placeholder="What needs to get done?" maxlength="80" autocomplete="off">
                <span class="char-count"><span id="charCount">0</span>/80</span>
            </div>
            <button id="saveBtn" class="save-btn">
                <span>Add</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </section>
        
        <section class="goals-section">
            <div class="goals-header">
                <span class="goals-label">Today's goals</span>
                <span class="goals-progress" id="goalsProgress">0/0</span>
            </div>
            <ul class="goals-list" id="goalsList"></ul>
            <div class="empty-state" id="emptyState">
                <p>No goals yet. Add one above.</p>
            </div>
        </section>
        
        <section class="review-section" id="reviewSection">
            <div class="review-header">
                <span class="review-label">Yesterday's goals</span>
                <button class="review-dismiss" id="dismissReview">Dismiss</button>
            </div>
            <ul class="review-list" id="reviewList"></ul>
        </section>
        
        <footer class="footer">
            <p>Press <kbd>Enter</kbd> to add</p>
        </footer>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
